spring:
  application:
    name: orderservice
  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: order
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
