spring:
  application:
    name: userservice

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update   
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    consumer:
      group-id: userservice-group

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true