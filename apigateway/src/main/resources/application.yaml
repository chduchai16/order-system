spring:
  application:
    name: apigateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: userservice
            uri: lb://userservice
            predicates:
              - Path=/api/users/**

          - id: productservice
            uri: lb://productservice
            predicates:
              - Path=/api/products/**

          - id: orderservice
            uri: lb://orderservice
            predicates:
              - Path=/api/orders/**

          - id: paymentservice
            uri: lb://paymentservice
            predicates:
              - Path=/api/payments/**

          - id: notificationservice
            uri: lb://notificationservice
            predicates:
              - Path=/api/notifications/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
